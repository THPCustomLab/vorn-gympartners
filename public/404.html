<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VORN · Redirecting</title>
    <script>
      // GitHub Pages SPA fallback: preserve path and redirect to index.
      var segmentCount = 1; // number of subpath segments (e.g. /gympartners -> 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
